<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CONFIDENTIALITÉ MAXIMALE -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">

<title>Accès restreint · Okapi World Média</title>
<meta name="description" content="Document interne confidentiel.">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230A0A0A'/%3E%3Ctext x='50' y='68' font-family='Georgia' font-style='italic' font-size='60' fill='%23C9A84C' text-anchor='middle'%3E%E2%8B%86%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Space+Mono&family=Poppins:wght@500&display=swap" rel="stylesheet">

<style>
  :root {
    --bordeaux: #6D2E46;
    --bordeaux-dark: #4A1F30;
    --cream: #F5EFE6;
    --cream-light: #FAF5ED;
    --gold: #C9A84C;
    --gold-light: #E6C97A;
    --black: #0A0A0A;
    --ink: #1A1A1A;
    --mute: #8A7968;
    --line: #D4C9B8;
    --red: #8B3A3A;
    --red-dark: #5A2020;
    --serif: 'Cormorant Garamond', 'Georgia', serif;
    --sans: 'Inter', system-ui, sans-serif;
    --mono: 'DM Mono', 'Consolas', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; scroll-padding-top: 120px; }
  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--ink);
    line-height: 1.65;
    font-size: 15px;
    overflow-x: hidden;
  }

  /* ============================================== */
  /* ÉCRAN DE DÉVERROUILLAGE                         */
  /* ============================================== */
  #lock-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .lock-inner {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .lock-icon {
    font-family: var(--serif);
    font-style: italic;
    font-size: 60px;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 24px;
  }

  .lock-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .lock-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 36px;
    color: var(--cream);
    font-weight: 400;
    line-height: 1.1;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .lock-sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: #C9C0B3;
    margin-bottom: 40px;
    line-height: 1.5;
  }

  .lock-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .lock-input {
    background: rgba(245, 239, 230, 0.05);
    border: 1px solid var(--bordeaux-dark);
    color: var(--cream);
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 1px;
    border-radius: 0;
    outline: none;
    transition: border-color 0.3s ease;
    text-align: center;
  }

  .lock-input:focus {
    border-color: var(--gold);
  }

  .lock-btn {
    background: var(--gold);
    color: var(--black);
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    font-weight: 600;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .lock-btn:hover { background: var(--gold-light); }
  .lock-btn:disabled { opacity: 0.5; cursor: wait; }

  .lock-error {
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    letter-spacing: 1px;
    min-height: 16px;
  }

  .lock-footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--bordeaux-dark);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--mute);
    line-height: 1.8;
  }

  .lock-footer strong { color: var(--gold); font-weight: 500; }

  /* ============================================== */
  /* BADGE DÉVERROUILLÉ                              */
  /* ============================================== */
  #unlocked-badge {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(10, 10, 10, 0.9);
    color: var(--gold);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.5s ease;
    border: 0.5px solid var(--bordeaux-dark);
    pointer-events: none;
  }

  #unlocked-badge.show { opacity: 1; }

  /* ============================================== */
  /* BANDEAU ROUGE DOCUMENT INTERNE                   */
  /* ============================================== */
  .internal-banner {
    background: var(--red-dark);
    color: var(--cream);
    padding: 10px 40px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 102;
    border-bottom: 1px solid var(--red);
  }

  .internal-inner {
    max-width: 1440px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .internal-warn {
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 3px;
  }

  /* ============================================== */
  /* TOP BAR OWM                                     */
  /* ============================================== */
  .top-bar {
    position: sticky;
    top: 38px;
    z-index: 101;
    background: rgba(245, 239, 230, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 0.5px solid var(--line);
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .top-bar-left {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--mute);
    text-transform: uppercase;
    text-decoration: none;
  }

  .top-bar-left strong { color: var(--gold); font-weight: 500; }
  .top-bar-left .separator { color: var(--mute); margin: 0 8px; }

  .top-bar-right {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--red);
    font-weight: 500;
  }

  /* ============================================== */
  /* HERO                                            */
  /* ============================================== */
  .audit-hero {
    background: var(--black);
    color: var(--cream);
    padding: 100px 40px 80px;
    position: relative;
    overflow: hidden;
  }

  .audit-hero::before {
    content: '';
    position: absolute;
    left: 40px;
    top: 100px;
    bottom: 80px;
    width: 1px;
    background: var(--gold);
    opacity: 0.5;
  }

  .audit-hero-inner {
    max-width: 1000px;
    margin: 0 auto;
    padding-left: 40px;
    position: relative;
  }

  .hero-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 48px;
  }

  .hero-brand {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(72px, 10vw, 144px);
    font-weight: 400;
    color: var(--cream);
    line-height: 0.9;
    letter-spacing: -3px;
    margin-bottom: 16px;
  }

  .hero-sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(22px, 3vw, 32px);
    color: var(--gold);
    line-height: 1.3;
    font-weight: 400;
    margin-bottom: 60px;
    max-width: 680px;
  }

  .hero-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    padding-top: 32px;
    border-top: 1px solid var(--bordeaux-dark);
    max-width: 720px;
  }

  .hero-meta-block {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 3px;
    line-height: 1.8;
    color: var(--mute);
  }

  .hero-meta-block strong {
    display: block;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .hero-meta-block span {
    color: #C9C0B3;
    display: block;
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    letter-spacing: 0;
    text-transform: none;
  }

  /* ============================================== */
  /* LAYOUT + TOC                                    */
  /* ============================================== */
  .main-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 40px;
    gap: 80px;
  }

  .toc-sidebar { padding: 60px 0; }

  .toc-sticky {
    position: sticky;
    top: 120px;
  }

  .toc-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }

  .toc-list { list-style: none; }

  .toc-list .toc-category {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--bordeaux);
    font-weight: 600;
    padding: 12px 0 6px;
    margin-top: 8px;
    border-top: 0.5px solid var(--line);
  }

  .toc-list .toc-category:first-child { margin-top: 0; border-top: none; padding-top: 0; }
  .toc-list .toc-category.interne { color: var(--red); border-top-color: var(--red-dark); }

  .toc-list li { margin-bottom: 2px; }

  .toc-list a {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 6px 0 6px 12px;
    font-family: var(--sans);
    font-size: 13px;
    color: var(--mute);
    text-decoration: none;
    transition: all 0.3s ease;
    line-height: 1.4;
    border-left: 2px solid transparent;
    margin-left: -14px;
  }

  .toc-list a:hover {
    color: var(--bordeaux);
    border-left-color: var(--gold);
  }

  .toc-list a.active {
    color: var(--bordeaux);
    border-left-color: var(--bordeaux);
    font-weight: 500;
  }

  .toc-list a.interne-link { color: #B87878; }
  .toc-list a.interne-link:hover { color: var(--red); border-left-color: var(--red); }
  .toc-list a.interne-link.active { color: var(--red-dark); border-left-color: var(--red-dark); font-weight: 600; }

  .toc-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gold);
    min-width: 20px;
    font-weight: 500;
  }

  .toc-list a.interne-link .toc-num { color: var(--red); }

  /* ============================================== */
  /* CONTENU PRINCIPAL                               */
  /* ============================================== */
  .audit-content {
    padding: 60px 0 100px;
    max-width: 820px;
  }

  section.audit-section {
    margin-bottom: 100px;
    scroll-margin-top: 120px;
  }

  .section-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }

  .section-tag strong { color: var(--bordeaux); font-weight: 500; margin-right: 8px; }

  .section-tag.interne { color: var(--red); border-bottom-color: var(--red); }
  .section-tag.interne strong { color: var(--red-dark); }
  .section-tag.interne .lock { margin-left: 12px; font-size: 12px; }

  h2.section-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 400;
    color: var(--bordeaux);
    line-height: 1;
    letter-spacing: -1px;
    margin-bottom: 28px;
  }

  h2.section-title em { color: var(--gold); font-weight: 500; }

  h2.interne-title { color: var(--red-dark); }
  h2.interne-title em { color: var(--red); }

  h3.subsection {
    font-family: var(--serif);
    font-style: italic;
    font-size: 24px;
    color: var(--black);
    font-weight: 500;
    line-height: 1.2;
    margin: 40px 0 16px;
  }

  h3.interne-sub { color: var(--red-dark); }

  .intro {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    line-height: 1.55;
    color: var(--bordeaux-dark);
    margin-bottom: 32px;
  }

  p { margin-bottom: 16px; }
  strong { color: var(--black); font-weight: 600; }
  em { color: var(--bordeaux); font-style: italic; }

  ul, ol { margin: 16px 0 24px; padding-left: 20px; }
  li { margin-bottom: 8px; line-height: 1.6; }

  /* ============================================== */
  /* SECTION INTERNE - DIVIDER                       */
  /* ============================================== */
  .partie-b-divider {
    margin: 80px 0 40px;
    padding: 40px;
    background: linear-gradient(135deg, var(--red-dark) 0%, var(--black) 100%);
    color: var(--cream);
    border-left: 4px solid var(--gold);
  }

  .pb-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .pb-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 36px;
    color: var(--cream);
    font-weight: 400;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }

  .pb-sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: #D4C9B8;
    line-height: 1.5;
    margin: 0;
  }

  /* ============================================== */
  /* ÉLÉMENTS AUDIT (identique à la version Joel)    */
  /* ============================================== */
  .lead-block {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    line-height: 1.5;
    color: var(--bordeaux-dark);
    padding: 28px 36px;
    border-left: 3px solid var(--gold);
    background: var(--cream-light);
    margin: 28px 0 40px;
  }

  .signature-block { margin-top: 56px; padding-top: 28px; border-top: 1px solid var(--line); }
  .signature-bar { width: 40px; height: 1px; background: var(--gold); margin-bottom: 12px; }
  .sig-name { font-family: var(--serif); font-style: italic; font-size: 20px; font-weight: 500; color: var(--black); margin-bottom: 4px; }
  .sig-role { font-family: var(--mono); font-size: 10px; color: var(--mute); letter-spacing: 2px; margin-bottom: 4px; }
  .sig-date { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--mute); }

  .exec-callout {
    background: var(--cream-light);
    border-left: 4px solid var(--bordeaux);
    padding: 28px 36px;
    margin: 28px 0 40px;
  }

  .exec-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--gold);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .exec-quote {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    line-height: 1.4;
    color: var(--bordeaux);
    margin: 0;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin: 40px 0;
  }

  .stat-card {
    background: var(--black);
    color: var(--cream);
    padding: 28px 20px;
    text-align: center;
  }

  .stat-num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 48px;
    font-weight: 500;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-unit { font-family: var(--mono); font-size: 10px; color: var(--cream); letter-spacing: 2px; margin-bottom: 10px; }
  .stat-caption { font-size: 12px; color: #C9C0B3; line-height: 1.5; }

  .reco-final {
    background: var(--gold);
    color: var(--black);
    padding: 20px 28px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    line-height: 1.4;
    margin: 28px 0;
  }

  .reco-final strong { color: var(--bordeaux-dark); }

  .audit-axis {
    margin-bottom: 36px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
  }

  .axis-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .axis-label { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; color: var(--black); font-weight: 600; }
  .axis-score { font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--bordeaux); font-weight: 500; }
  .axis-score span { font-size: 14px; color: var(--mute); }

  .axis-bar {
    width: 100%;
    height: 6px;
    background: var(--cream-light);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .axis-fill { height: 100%; background: linear-gradient(90deg, var(--bordeaux) 0%, var(--bordeaux-dark) 100%); }

  .axis-obs, .axis-reco { font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
  .axis-reco { padding-left: 14px; border-left: 2px solid var(--gold); color: var(--bordeaux-dark); }

  .global-note {
    background: var(--black);
    color: var(--cream);
    padding: 28px;
    text-align: center;
    margin: 40px 0;
  }

  .global-note-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--gold); margin-bottom: 10px; }
  .global-note-num { font-family: var(--serif); font-style: italic; font-size: 64px; font-weight: 500; color: var(--gold); line-height: 1; margin-bottom: 10px; }
  .global-note-num span { font-size: 24px; color: var(--cream); }
  .global-note-caption { font-family: var(--serif); font-style: italic; font-size: 15px; color: #C9C0B3; max-width: 560px; margin: 0 auto; }

  .table-wrap { margin: 28px 0 40px; overflow-x: auto; }

  .compet-table, .kpi-table, .planning-table { width: 100%; border-collapse: collapse; font-size: 13px; }

  .compet-table th, .kpi-table th, .planning-table th {
    background: var(--black);
    color: var(--cream);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-align: left;
    padding: 12px 14px;
    font-weight: 500;
  }

  .compet-table td, .kpi-table td, .planning-table td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
    line-height: 1.5;
  }

  .compet-table tr:nth-child(even) td,
  .kpi-table tr:nth-child(even) td,
  .planning-table tr:nth-child(even) td { background: var(--cream-light); }

  .compet-table td:first-child,
  .kpi-table td:first-child,
  .planning-table td:first-child { font-weight: 600; color: var(--bordeaux); }

  .kpi-table td:last-child { color: var(--gold); font-weight: 600; }

  .pullquote {
    background: var(--bordeaux);
    color: var(--cream);
    padding: 28px 36px;
    margin: 40px 0;
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    line-height: 1.5;
    text-align: center;
  }

  .pullquote em { color: var(--gold); }

  .zones-grid { margin: 28px 0 40px; }

  .zone-block {
    padding: 18px 22px;
    margin-bottom: 10px;
    background: var(--cream-light);
    border-left: 3px solid var(--line);
  }

  .zone-block.highlight {
    border-left-color: var(--gold);
    background: #FAF0D8;
    border: 1px solid var(--gold);
    border-left-width: 4px;
  }

  .zone-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; font-weight: 600; margin-bottom: 6px; color: var(--mute); }
  .zone-block.highlight .zone-label { color: var(--bordeaux); }
  .zone-desc { font-size: 13px; line-height: 1.6; margin: 0; }

  /* Section sombre Burkina */
  .dark-section {
    background: var(--black);
    color: var(--cream);
    margin: 0 -40px;
    padding: 90px 40px;
  }

  .dark-section h2.section-title { color: var(--cream); }
  .dark-section .intro, .dark-section p { color: #D4C9B8; }
  .dark-section strong { color: var(--cream); }
  .dark-section em { color: var(--gold); }

  .pepite-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 36px 0; }
  .pepite-card { background: var(--bordeaux-dark); padding: 28px; }
  .pepite-num { font-family: var(--serif); font-style: italic; font-size: 32px; color: var(--gold); font-weight: 500; line-height: 1; margin-bottom: 10px; }
  .pepite-title { font-family: var(--serif); font-style: italic; font-size: 20px; color: var(--cream); font-weight: 500; margin-bottom: 10px; }
  .pepite-sep { width: 28px; height: 1px; background: var(--gold); margin-bottom: 14px; }
  .pepite-body { font-size: 14px; line-height: 1.6; color: var(--cream); margin: 0; }

  .manner-block { background: var(--bordeaux-dark); padding: 22px 28px; margin: 36px 0 20px; }
  .manner-title { font-family: var(--serif); font-style: italic; font-size: 20px; color: var(--gold); font-weight: 500; margin-bottom: 8px; }
  .manner-items { margin-top: 20px; }
  .manner-item { display: grid; grid-template-columns: 24px 1fr; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
  .manner-arrow { font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--gold); }
  .manner-item p { margin: 0; font-size: 14px; line-height: 1.6; }

  /* Roadmap */
  .roadmap-item {
    padding: 22px 26px;
    margin-bottom: 14px;
    background: var(--cream-light);
    border-left: 3px solid var(--bordeaux);
  }

  .roadmap-head { display: flex; gap: 20px; align-items: baseline; margin-bottom: 10px; }
  .roadmap-phase { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--gold); font-weight: 600; flex-shrink: 0; }
  .roadmap-title { font-family: var(--serif); font-style: italic; font-size: 20px; color: var(--bordeaux); font-weight: 500; margin: 0; }
  .roadmap-body { font-size: 14px; line-height: 1.6; margin: 0 0 6px; }
  .roadmap-deliverable { font-size: 13px; font-style: italic; color: var(--bordeaux-dark); margin: 0; }

  .callout {
    background: var(--cream-light);
    border: 1px solid var(--gold);
    border-left: 4px solid var(--gold);
    padding: 18px 22px;
    margin: 22px 0;
  }

  .callout p { margin: 0; font-size: 14px; line-height: 1.6; color: var(--bordeaux-dark); }

  /* Offres */
  .offers-wrap { margin: 28px 0; }

  .offer-card { padding: 24px 28px; margin-bottom: 14px; background: white; border: 1px solid var(--line); }
  .offer-card.highlight { background: var(--bordeaux); color: var(--cream); border: none; }

  .offer-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 2.5px; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
  .offer-name { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--black); font-weight: 500; margin-bottom: 4px; }
  .offer-card.highlight .offer-name { color: var(--cream); }
  .offer-price { font-family: var(--serif); font-size: 28px; color: var(--bordeaux); font-weight: 700; margin-bottom: 4px; }
  .offer-card.highlight .offer-price { color: var(--gold); }
  .offer-unit { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--mute); margin-bottom: 14px; }
  .offer-card.highlight .offer-unit { color: #E8DFD0; }

  .offer-features { list-style: none; padding: 0; margin: 14px 0; }
  .offer-features li { padding: 4px 0 4px 18px; position: relative; font-size: 13px; line-height: 1.5; }
  .offer-features li::before { content: '—'; position: absolute; left: 0; color: var(--bordeaux); }
  .offer-card.highlight .offer-features li::before { color: var(--gold); }

  .offer-note { font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--mute); margin: 6px 0 0; }
  .offer-card.highlight .offer-note { color: #D4C9B8; }

  /* Steps */
  .step-block { display: grid; grid-template-columns: 56px 1fr; gap: 18px; padding: 18px 0; border-bottom: 1px solid var(--line); }
  .step-num { font-family: var(--serif); font-style: italic; font-size: 36px; color: var(--gold); font-weight: 500; line-height: 1; }
  .step-title { font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--black); font-weight: 500; margin-bottom: 4px; }
  .step-body-text { font-size: 13px; line-height: 1.6; margin: 0 0 6px; }
  .step-timing { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--bordeaux); font-weight: 600; }

  /* ============================================== */
  /* ÉLÉMENTS SECTIONS INTERNES                      */
  /* ============================================== */
  .interne-section { border-top: 2px solid var(--red); padding-top: 40px; }

  .tactic-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin: 28px 0 40px;
  }

  .tactic-card {
    background: var(--cream-light);
    padding: 20px 22px;
    border-top: 3px solid var(--red);
  }

  .tactic-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--red);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .tactic-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    color: var(--black);
    font-weight: 500;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .tactic-body { font-size: 13px; line-height: 1.55; margin: 0; }

  .timeline-block { margin: 28px 0 40px; }

  .timeline-item {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 20px;
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
  }

  .timeline-time {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--red);
    font-weight: 600;
    padding-top: 2px;
  }

  .timeline-content { font-size: 14px; line-height: 1.6; }
  .timeline-content strong { color: var(--red-dark); }

  .lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 24px 0 40px;
  }

  .lang-good, .lang-bad {
    padding: 20px 22px;
  }

  .lang-good {
    background: var(--cream-light);
    border-left: 3px solid #4A7C59;
  }

  .lang-bad {
    background: var(--cream-light);
    border-left: 3px solid var(--red);
  }

  .lang-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .lang-good .lang-label { color: #4A7C59; }
  .lang-bad .lang-label { color: var(--red); }

  .lang-good ul, .lang-bad ul { list-style: none; padding: 0; margin: 0; }
  .lang-good li, .lang-bad li {
    padding: 4px 0;
    font-size: 13px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    color: var(--ink);
  }

  .scenario-block {
    background: var(--cream-light);
    padding: 28px 32px;
    margin: 24px 0;
    border-left: 4px solid var(--red);
  }

  .scenario-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--red);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .scenario-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 24px;
    color: var(--red-dark);
    font-weight: 500;
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .scenario-body { font-size: 14px; line-height: 1.65; }
  .scenario-body p { margin-bottom: 10px; }
  .scenario-body strong { color: var(--red-dark); }

  .warning-list { list-style: none; padding: 0; margin: 20px 0 28px; }

  .warning-list li {
    padding: 10px 0 10px 24px;
    position: relative;
    font-size: 14px;
    line-height: 1.6;
    border-bottom: 0.5px solid var(--line);
  }

  .warning-list li::before {
    content: '⚠';
    position: absolute;
    left: 0;
    color: var(--red);
    font-size: 14px;
  }

  .stoploss-block {
    background: linear-gradient(135deg, var(--red-dark) 0%, var(--black) 100%);
    color: var(--cream);
    padding: 28px 32px;
    margin: 28px 0;
  }

  .stoploss-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .stoploss-block p { color: var(--cream); line-height: 1.6; }
  .stoploss-block ol { margin-top: 12px; }
  .stoploss-block ol li { color: var(--cream); margin-bottom: 10px; }
  .stoploss-block strong { color: var(--gold); }

  .checkpoint-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin: 24px 0 32px;
  }

  .checkpoint {
    background: var(--cream-light);
    padding: 18px 22px;
    border-left: 2px solid var(--bordeaux);
  }

  .check-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--bordeaux);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .checkpoint p { font-size: 13px; line-height: 1.55; margin: 0; }

  .transform-playbook { margin: 24px 0 32px; }

  .playbook-step {
    display: grid;
    grid-template-columns: 50px 1fr;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 0.5px solid var(--line);
    align-items: flex-start;
  }

  .playbook-num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 32px;
    color: var(--gold);
    font-weight: 500;
    line-height: 1;
  }

  .playbook-content { font-size: 14px; line-height: 1.6; }
  .playbook-content strong { color: var(--bordeaux); }

  .rules-block { margin: 28px 0 40px; }

  .rule-item {
    display: grid;
    grid-template-columns: 50px 1fr;
    gap: 20px;
    padding: 22px 0;
    border-bottom: 1px solid var(--line);
  }

  .rule-num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 36px;
    color: var(--gold);
    font-weight: 500;
    line-height: 1;
  }

  .rule-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    color: var(--red-dark);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .rule-body p { font-size: 14px; line-height: 1.65; margin: 0; }

  .final-reminder {
    background: linear-gradient(135deg, var(--bordeaux-dark) 0%, var(--black) 100%);
    color: var(--cream);
    padding: 32px 40px;
    margin: 40px 0 0;

  .final-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 600;
  }

  .final-body {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    line-height: 1.55;
    color: var(--cream);

  .closing {

    color: var(--cream);
    margin: 60px -40px 0;
    padding: 100px 40px;
    position: relative;
  }

  .closing::before {
    content: '';
    position: absolute;
    top: 0;
    left: 40px;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, transparent 10%, var(--gold) 50%, transparent 90%);

  .closing-inner { max-width: 800px; margin: 0 auto; padding-left: 48px; }

  .closing-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 28px;

  .closing-title {

    font-size: clamp(36px, 5vw, 52px);

    color: var(--cream);
    margin-bottom: 28px;
    letter-spacing: -1px;
  }

  .closing-title em { color: var(--gold); font-style: italic; font-weight: 500; display: block; margin-top: 8px; }

  .closing-sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: #D4C9B8;
    line-height: 1.5;
    margin-bottom: 40px;
  }

  .closing-sig {
    padding-top: 20px;
    border-top: 1px solid rgba(201, 168, 76, 0.2);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    line-height: 1.8;
  }

  .closing-sig strong { display: block; color: var(--gold); font-weight: 500; margin-bottom: 6px; }
  .closing-sig span { color: var(--mute); display: block; }

  .footer-mini {
    padding: 20px 40px;
    text-align: center;
    background: var(--red-dark);
    color: var(--gold);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    font-weight: 600;

  /* ============================================== */
  @media (max-width: 960px) {

    .main-layout { grid-template-columns: 1fr; padding: 0 24px; gap: 0; }

    .toc-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .toc-list .toc-category { width: 100%; }
    .toc-list li { margin: 0; }
    .toc-list a { padding: 6px 10px; border-left: none; border: 1px solid var(--line); font-size: 11px; margin-left: 0; }
    .toc-list a.active { background: var(--bordeaux); color: var(--cream); border-color: var(--bordeaux); }

    .audit-content { padding: 30px 0 60px; }
    section.audit-section { margin-bottom: 60px; }

    .stats-grid { grid-template-columns: 1fr; }
    .pepite-grid { grid-template-columns: 1fr; }
    .tactic-grid { grid-template-columns: 1fr; }
    .lang-grid { grid-template-columns: 1fr; }
    .checkpoint-grid { grid-template-columns: 1fr; }

    .dark-section { margin: 0 -24px; padding: 60px 24px; }
    .partie-b-divider { padding: 28px; }
    .pb-title { font-size: 28px; }

    .table-wrap { margin: 20px -24px; padding: 0 24px; }

    .closing { margin: 40px -24px 0; padding: 60px 24px; }
    .closing::before { left: 24px; }
    .closing-inner { padding-left: 32px; }

    .timeline-item { grid-template-columns: 80px 1fr; gap: 12px; }
    .rule-item { grid-template-columns: 40px 1fr; gap: 16px; }
    .rule-num { font-size: 28px; }

    .lock-title { font-size: 28px; }
    .lock-sub { font-size: 14px; }
  }
</style>

<script>
(function() {
  'use strict';

  const lockScreen = document.getElementById('lock-screen');
  const form = document.getElementById('lock-form');
  const input = document.getElementById('pw-input');
  const button = document.getElementById('unlock-btn');
  const errorDiv = document.getElementById('lock-error');
  const contentDiv = document.getElementById('content');
  const badge = document.getElementById('unlocked-badge');

  const payloadEl = document.getElementById('encrypted-payload');
  const payload = JSON.parse(payloadEl.textContent);

  // Utilitaires base64 ↔ Uint8Array
  function b64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function deriveKey(password, salt, iterations) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      'raw',
      enc.encode(password),
      { name: 'PBKDF2' },
      false,
      ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      {
        name: 'PBKDF2',
        salt: salt,
        iterations: iterations,
        hash: 'SHA-256'
      },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
  }

  async function decrypt(password) {
    const salt = b64ToBytes(payload.salt);
    const iv = b64ToBytes(payload.iv);
    const ct = b64ToBytes(payload.ct);

    const key = await deriveKey(password, salt, payload.iter);

    const plaintext = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      ct
    );

    return new TextDecoder().decode(plaintext);
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const password = input.value;
    if (!password) return;

    errorDiv.textContent = '';
    button.disabled = true;
    button.textContent = 'DÉCHIFFREMENT...';

    try {
      const html = await decrypt(password);
      // Injecter le contenu déchiffré
      contentDiv.innerHTML = html;
      contentDiv.style.display = 'block';

      // Cacher l'écran de verrouillage
      lockScreen.style.transition = 'opacity 0.6s ease';
      lockScreen.style.opacity = '0';
      setTimeout(() => lockScreen.remove(), 600);

      // Afficher le badge
      setTimeout(() => {
        badge.classList.add('show');
        setTimeout(() => badge.classList.remove('show'), 4000);
      }, 300);

      // Exécuter tout script contenu dans le HTML injecté
      const scripts = contentDiv.querySelectorAll('script');
      scripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        newScript.textContent = oldScript.textContent;
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });

      // Effacer le mot de passe de la mémoire (best effort)
      input.value = '';

    } catch (err) {
      button.disabled = false;
      button.textContent = 'DÉVERROUILLER';
      errorDiv.textContent = '✗ Mot de passe incorrect';
      input.value = '';
      input.focus();

      // Shake animation
      input.style.transition = 'transform 0.08s ease';
      let offset = 0;
      const shake = setInterval(() => {
        offset = offset === 0 ? -8 : offset === -8 ? 8 : 0;
        input.style.transform = `translateX(${offset}px)`;
        if (offset === 0) clearInterval(shake);
      }, 80);
    }
  });

  // Focus automatique sur le champ
  input.focus();
})();
</script>
