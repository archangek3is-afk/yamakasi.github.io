<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable · Okapi World Média</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0A0A0A;
      color:#F5F0E8;
      font-family:'Cormorant Garamond', serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px 20px;
    }
    .code {
      font-family:'Bebas Neue', sans-serif;
      font-size:clamp(100px, 20vw, 200px);
      color:rgba(201,168,76,0.12);
      line-height:1;
      margin-bottom:0;
    }
    .label {
      font-family:'Space Mono', monospace;
      font-size:10px;
      letter-spacing:5px;
      text-transform:uppercase;
      color:#C9A84C;
      margin-bottom:24px;
    }
    h1 {
      font-size:clamp(28px, 5vw, 48px);
      font-weight:300;
      font-style:italic;
      margin-bottom:16px;
      line-height:1.3;
    }
    p {
      font-size:18px;
      color:rgba(245,240,232,0.6);
      max-width:400px;
      line-height:1.7;
      margin-bottom:48px;
    }
    .btn {
      display:inline-block;
      padding:16px 40px;
      border:1px solid #C9A84C;
      color:#C9A84C;
      text-decoration:none;
      font-family:'Space Mono', monospace;
      font-size:11px;
      letter-spacing:4px;
      text-transform:uppercase;
      transition:all 0.3s;
    }
    .btn:hover {
      background:#C9A84C;
      color:#0A0A0A;
    }
    .divider {
      width:40px;
      height:1px;
      background:#C9A84C;
      margin:0 auto 24px;
    }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="label">Page introuvable</div>
  <div class="divider"></div>
  <h1>Cette image n'existe pas<br>dans notre univers.</h1>
  <p>La page que vous cherchez a peut-être été déplacée, renommée ou n'a jamais existé.</p>
  <a href="https://archangek3is-afk.github.io/yamakasi.github.io/" class="btn">← Retour à l'accueil</a>
</body>
</html>
